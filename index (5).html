<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.header{background:#fff;padding:1.25rem 1.5rem;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:1.25rem 1.5rem;background:#f5f5f3}
.stat{background:#fff;border-radius:10px;padding:0.85rem 1rem;border:1px solid #e5e5e3}
.stat-label{font-size:12px;color:#666;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600;color:#1a1a1a}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e5e5e3;padding:0 1.5rem;background:#fff}
.tab{padding:10px 18px;font-size:13px;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1a1a1a;border-color:#1a1a1a}
.view{display:none;padding:1.25rem 1.5rem}
.view.active{display:block}
.kanban{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;align-items:start}
.col-header{font-size:12px;font-weight:600;color:#666;padding:6px 4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.col-count{border-radius:100px;padding:1px 8px;font-size:11px;font-weight:600}
.card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:#aaa}
.card-org{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.card-role{font-size:12px;color:#666;margin-bottom:8px;line-height:1.4}
.card-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.badge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:600}
.deadline-ok{font-size:11px;color:#888}
.deadline-urgent{font-size:11px;color:#c0392b;font-weight:600}
.btn{background:#fff;border:1px solid #d0d0ce;border-radius:8px;padding:7px 16px;font-size:13px;color:#1a1a1a;cursor:pointer;font-weight:500}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{background:#fff;color:#c0392b;border-color:#e5e5e3}
.btn-danger:hover{background:#fff0ee}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;border:1px solid #e5e5e3;width:min(540px,95vw);max-height:88vh;overflow-y:auto;padding:1.75rem}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 12px;font-size:13px;border:1px solid #d0d0ce;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#999}
.field textarea{resize:vertical;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e5e5e3}
.list-table{width:100%;border-collapse:collapse;font-size:13px}
.list-table th{text-align:left;padding:8px 12px;font-size:12px;font-weight:600;color:#666;border-bottom:1px solid #e5e5e3;white-space:nowrap}
.list-table td{padding:10px 12px;border-bottom:1px solid #e5e5e3;color:#1a1a1a;vertical-align:middle}
.list-table tr:hover td{background:#f9f9f7}
.empty{text-align:center;padding:3.5rem;color:#999;font-size:13px}
.filter-bar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filter-bar select{padding:6px 12px;font-size:13px;border:1px solid #d0d0ce;border-radius:8px;background:#fff;color:#1a1a1a;outline:none}
.del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;padding:2px 6px;border-radius:4px;line-height:1}
.del-btn:hover{color:#c0392b}
.section-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:1rem}
.contact-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px}
.contact-name{font-size:14px;font-weight:600;margin-bottom:2px}
.contact-meta{font-size:12px;color:#666}
.toolbar{display:flex;gap:8px;align-items:center}
@media(max-width:700px){
  .kanban{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .field-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <h1>🎯 Internship Tracker</h1>
  <div class="toolbar">
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add application</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div style="background:#fff">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('kanban',this)">Board</div>
    <div class="tab" onclick="switchTab('list',this)">List</div>
    <div class="tab" onclick="switchTab('deadlines',this)">Deadlines</div>
    <div class="tab" onclick="switchTab('contacts',this)">Contacts</div>
  </div>
</div>

<div class="view active" id="view-kanban">
  <div class="kanban" id="kanban-board"></div>
</div>

<div class="view" id="view-list">
  <div class="filter-bar">
    <select id="filter-status" onchange="renderList()">
      <option value="">All statuses</option>
      <option>Researching</option><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option>
    </select>
    <select id="filter-type" onchange="renderList()">
      <option value="">All types</option>
      <option>International org</option><option>NGO</option><option>Multilateral</option><option>Private sector</option><option>Other</option>
    </select>
  </div>
  <div id="list-view"></div>
</div>

<div class="view" id="view-deadlines">
  <div id="deadlines-view"></div>
</div>

<div class="view" id="view-contacts">
  <div id="contacts-view"></div>
</div>

<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Add application</h2>
    <div class="field-row">
      <div class="field"><label>Organization *</label><input id="f-org" placeholder="e.g. IFRC, UNICEF, WTO"></div>
      <div class="field"><label>Type</label>
        <select id="f-type"><option>International org</option><option>NGO</option><option>Multilateral</option><option>Private sector</option><option>Other</option></select>
      </div>
    </div>
    <div class="field"><label>Role / position *</label><input id="f-role" placeholder="e.g. NSD Competency Framework Intern"></div>
    <div class="field-row">
      <div class="field"><label>Location</label><input id="f-loc" placeholder="e.g. Geneva, Remote"></div>
      <div class="field"><label>Status</label>
        <select id="f-status"><option>Researching</option><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option></select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Deadline</label><input id="f-deadline" type="date"></div>
      <div class="field"><label>Application link</label><input id="f-link" placeholder="https://..."></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Contact name</label><input id="f-contact" placeholder="HR / referral contact name"></div>
      <div class="field"><label>Contact email / LinkedIn</label><input id="f-contact-info" placeholder="email or LinkedIn URL"></div>
    </div>
    <div class="field"><label>CV version used</label><input id="f-cv" placeholder="e.g. CV_IFRC_March2026.pdf"></div>
    <div class="field"><label>Cover letter notes</label><textarea id="f-cl" placeholder="Key angle, points covered..."></textarea></div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Requirements, follow-up reminders, impressions..."></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="delete-btn" onclick="deleteCurrentApp()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveApp()">Save</button>
    </div>
  </div>
</div>

<script>
const COLS = ['Researching','Applied','Interview','Offer','Rejected'];
const COLORS = {
  Researching:{bg:'#f1efeb',text:'#5a5a55',border:'#d0cec8'},
  Applied:{bg:'#e8f0fb',text:'#1a4fa0',border:'#b0c8f0'},
  Interview:{bg:'#fef3e2',text:'#8a5200',border:'#f5d08a'},
  Offer:{bg:'#e8f5e9',text:'#2e7d32',border:'#a5d6a7'},
  Rejected:{bg:'#fdecea',text:'#b71c1c',border:'#f5a8a8'}
};

let apps = JSON.parse(localStorage.getItem('intern_apps_v2')||'[]');
let editId = null;

function save(){localStorage.setItem('intern_apps_v2',JSON.stringify(apps))}
function genId(){return Date.now()+'_'+Math.random().toString(36).slice(2)}

function daysUntil(d){
  if(!d)return null;
  const diff=new Date(d)-new Date(new Date().toDateString());
  return Math.ceil(diff/86400000);
}

function fmtDate(d){
  if(!d)return '';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function deadlineLabel(d){
  const days=daysUntil(d);
  if(days===null)return '';
  if(days<0)return `<span class="deadline-urgent">Overdue</span>`;
  if(days===0)return `<span class="deadline-urgent">Today!</span>`;
  if(days<=7)return `<span class="deadline-urgent">${days}d left</span>`;
  return `<span class="deadline-ok">${days}d</span>`;
}

function renderStats(){
  const total=apps.length;
  const submitted=apps.filter(a=>['Applied','Interview','Offer'].includes(a.status)).length;
  const interviews=apps.filter(a=>a.status==='Interview').length;
  const urgent=apps.filter(a=>{const d=daysUntil(a.deadline);return d!==null&&d>=0&&d<=7&&!['Offer','Rejected'].includes(a.status)}).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total tracked</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Submitted</div><div class="stat-val">${submitted}</div></div>
    <div class="stat"><div class="stat-label">Interviews</div><div class="stat-val">${interviews}</div></div>
    <div class="stat"><div class="stat-label" style="color:${urgent>0?'#c0392b':'#666'}">Deadlines this week</div><div class="stat-val" style="color:${urgent>0?'#c0392b':'#1a1a1a'}">${urgent}</div></div>
  `;
}

function renderKanban(){
  const board=document.getElementById('kanban-board');
  board.innerHTML=COLS.map(col=>{
    const c=COLORS[col];
    const cards=apps.filter(a=>a.status===col);
    return`<div>
      <div class="col-header">
        <span>${col}</span>
        <span class="col-count" style="background:${c.bg};color:${c.text}">${cards.length}</span>
      </div>
      ${cards.length?cards.map(a=>`
        <div class="card" onclick="editApp('${a.id}')">
          <div class="card-org">${escHtml(a.org)}</div>
          <div class="card-role">${escHtml(a.role)}</div>
          <div class="card-meta">
            <span class="badge" style="background:${c.bg};color:${c.text}">${escHtml(a.type||'—')}</span>
            ${deadlineLabel(a.deadline)}
          </div>
          ${a.loc?`<div style="font-size:11px;color:#aaa;margin-top:5px">${escHtml(a.loc)}</div>`:''}
        </div>`).join(''):`<div style="font-size:12px;color:#ccc;padding:10px 4px;text-align:center">Empty</div>`}
    </div>`;
  }).join('');
}

function renderList(){
  const statusF=document.getElementById('filter-status').value;
  const typeF=document.getElementById('filter-type').value;
  const filtered=apps.filter(a=>(!statusF||a.status===statusF)&&(!typeF||a.type===typeF));
  const el=document.getElementById('list-view');
  if(!filtered.length){el.innerHTML='<div class="empty">No applications match this filter.</div>';return}
  const c=col=>COLORS[col];
  el.innerHTML=`<table class="list-table">
    <thead><tr>
      <th>Organization</th><th>Role</th><th>Status</th><th>Deadline</th><th>CV version</th><th>Contact</th><th></th>
    </tr></thead>
    <tbody>${filtered.map(a=>`<tr onclick="editApp('${a.id}')" style="cursor:pointer">
      <td><strong>${escHtml(a.org)}</strong>${a.loc?`<br><span style="font-size:11px;color:#999">${escHtml(a.loc)}</span>`:''}</td>
      <td>${escHtml(a.role)}</td>
      <td><span class="badge" style="background:${c(a.status).bg};color:${c(a.status).text}">${a.status}</span></td>
      <td>${a.deadline?`${fmtDate(a.deadline)} ${deadlineLabel(a.deadline)}`:'-'}</td>
      <td style="font-size:12px;color:#666">${escHtml(a.cv)||'-'}</td>
      <td style="font-size:12px">${escHtml(a.contact)||'-'}</td>
      <td><button class="del-btn" onclick="event.stopPropagation();confirmDelete('${a.id}')">×</button></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderDeadlines(){
  const sorted=apps.filter(a=>a.deadline&&!['Rejected'].includes(a.status))
    .sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const el=document.getElementById('deadlines-view');
  if(!sorted.length){el.innerHTML='<div class="empty">No deadlines set. Add a deadline when creating an application.</div>';return}
  const c=col=>COLORS[col];
  el.innerHTML=`<table class="list-table">
    <thead><tr><th>Organization</th><th>Role</th><th>Deadline</th><th>Days left</th><th>Status</th></tr></thead>
    <tbody>${sorted.map(a=>{
      const d=daysUntil(a.deadline);
      const dText=d<0?'Overdue':d===0?'Today!':d+'d left';
      const dColor=d<=0?'#c0392b':d<=7?'#e67e22':'#1a1a1a';
      return`<tr onclick="editApp('${a.id}')" style="cursor:pointer">
        <td><strong>${escHtml(a.org)}</strong></td>
        <td>${escHtml(a.role)}</td>
        <td>${fmtDate(a.deadline)}</td>
        <td style="color:${dColor};font-weight:${d<=7?600:400}">${dText}</td>
        <td><span class="badge" style="background:${c(a.status).bg};color:${c(a.status).text}">${a.status}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function renderContacts(){
  const withContact=apps.filter(a=>a.contact||a.contactInfo);
  const el=document.getElementById('contacts-view');
  if(!withContact.length){el.innerHTML='<div class="empty">No contacts added yet. Fill in contact details when adding an application.</div>';return}
  el.innerHTML=withContact.map(a=>`
    <div class="contact-card" onclick="editApp('${a.id}')" style="cursor:pointer">
      <div class="contact-name">${escHtml(a.contact||'Unknown contact')}</div>
      <div class="contact-meta">
        ${a.contactInfo?`<a href="${a.contactInfo.startsWith('http')?a.contactInfo:'mailto:'+a.contactInfo}" onclick="event.stopPropagation()" style="color:#1a4fa0">${escHtml(a.contactInfo)}</a> &nbsp;·&nbsp; `:'' }
        ${escHtml(a.org)} — ${escHtml(a.role)}
      </div>
    </div>`).join('');
}

function renderAll(){renderStats();renderKanban();renderList();renderDeadlines();renderContacts()}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
}

function openModal(app=null){
  editId=app?app.id:null;
  document.getElementById('modal-title').textContent=app?'Edit application':'Add application';
  document.getElementById('f-org').value=app?.org||'';
  document.getElementById('f-role').value=app?.role||'';
  document.getElementById('f-loc').value=app?.loc||'';
  document.getElementById('f-type').value=app?.type||'International org';
  document.getElementById('f-status').value=app?.status||'Researching';
  document.getElementById('f-deadline').value=app?.deadline||'';
  document.getElementById('f-link').value=app?.link||'';
  document.getElementById('f-contact').value=app?.contact||'';
  document.getElementById('f-contact-info').value=app?.contactInfo||'';
  document.getElementById('f-cv').value=app?.cv||'';
  document.getElementById('f-cl').value=app?.cl||'';
  document.getElementById('f-notes').value=app?.notes||'';
  document.getElementById('delete-btn').style.display=app?'inline-block':'none';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}
function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal()}

function saveApp(){
  const org=document.getElementById('f-org').value.trim();
  const role=document.getElementById('f-role').value.trim();
  if(!org||!role){alert('Organization and role are required.');return}
  const data={
    id:editId||genId(),org,role,
    loc:document.getElementById('f-loc').value.trim(),
    type:document.getElementById('f-type').value,
    status:document.getElementById('f-status').value,
    deadline:document.getElementById('f-deadline').value,
    link:document.getElementById('f-link').value.trim(),
    contact:document.getElementById('f-contact').value.trim(),
    contactInfo:document.getElementById('f-contact-info').value.trim(),
    cv:document.getElementById('f-cv').value.trim(),
    cl:document.getElementById('f-cl').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
  };
  if(editId){const i=apps.findIndex(a=>a.id===editId);if(i>-1)apps[i]=data;}
  else{apps.push(data)}
  save();closeModal();renderAll();
}

function editApp(id){const a=apps.find(x=>x.id===id);if(a)openModal(a)}

function confirmDelete(id){
  if(confirm('Remove this application?')){
    apps=apps.filter(a=>a.id!==id);save();renderAll();
  }
}

function deleteCurrentApp(){
  if(editId&&confirm('Remove this application?')){
    apps=apps.filter(a=>a.id!==editId);save();closeModal();renderAll();
  }
}

function escHtml(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportCSV(){
  if(!apps.length){alert('No applications to export.');return}
  const headers=['Organization','Role','Location','Type','Status','Deadline','Link','Contact','Contact Info','CV Version','Cover Letter Notes','Notes'];
  const rows=apps.map(a=>[a.org,a.role,a.loc,a.type,a.status,a.deadline,a.link,a.contact,a.contactInfo,a.cv,a.cl,a.notes].map(v=>`"${(v||'').replace(/"/g,'""')}"`));
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='internship_tracker.csv';a.click();
  URL.revokeObjectURL(url);
}

  {id:'a01',org:'UNOPS',role:'Programme Management Internship',loc:'Copenhagen, Denmark',type:'International org',status:'Applied',deadline:'2026-03-16',link:'https://careers.unops.org',contact:'',contactInfo:'',cv:'Azamkhon_Sultonov_CV_UNOPS.docx',cl:'Programme support, data analysis, UN ecosystem credentials',notes:'Under Review. Helsinki also applied — rejected. Copenhagen still active.'},

  {id:'a03',org:'AstraZeneca',role:'Finance Intern — FP&A Career Starter',loc:'Warsaw, Poland',type:'Private sector',status:'Rejected',deadline:'2026-03-18',link:'https://careers.astrazeneca.com',contact:'',contactInfo:'',cv:'CV_Azamkhon_AstraZeneca_ATS.docx',cl:'FP&A language, Textrade financial reporting angle',notes:'Rejected. Screened on degree field — BBA vs Finance/Accounting specific.'},
  {id:'a04',org:'AstraZeneca',role:'Finance Intern — R2R Controlling',loc:'Warsaw, Poland',type:'Private sector',status:'Rejected',deadline:'2026-03-24',link:'https://careers.astrazeneca.com',contact:'',contactInfo:'',cv:'Azamkhon_Sultonov_CV_AstraZeneca.docx',cl:'BS reconciliation, journal entries, accruals language',notes:'Rejected. Same screening issue as FP&A — degree field mismatch.'},
  {id:'a05',org:'Coty',role:'Sales Intern',loc:'Warsaw, Poland',type:'Private sector',status:'Applied',deadline:'',link:'https://coty.com/careers',contact:'',contactInfo:'',cv:'CV_Azamkhon_Coty_SalesIntern_ATS.docx',cl:'Textrade sales experience, market monitoring angle',notes:'Applied within 12h of posting — approximately 2 applicants at time. Polish gap noted.'},
  {id:'a06',org:'ICMPD',role:'Conference and Events Support Intern',loc:'Vienna, Austria',type:'International org',status:'Applied',deadline:'2026-03-31',link:'mailto:PRS_Events_internship@icmpd.org',contact:'PRS Events Team',contactInfo:'PRS_Events_internship@icmpd.org',cv:'Azamkhon_Sultonov_CV_ICMPD_Vienna.docx',cl:'IT Park conference experience, Central Asia migration connection, Russian C1',notes:'Submitted via email with CV + cover letter. Strong fit — Central Asia is ICMPD priority region.'},
